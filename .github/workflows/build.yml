name: Build and deploy Firmware

on:
  push:
    branches: [ main ]
    
jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v4

    - name: Create secrets.h
      run: |
        cat > src/secrets.h << EOF
        #pragma once
        const char* ssid      = "${{ secrets.SSID }}";
        const char* password  = "${{ secrets.PASSWORD }}";
        const String botToken = "${{ secrets.BOTTOKEN }}";
        const String chatId   = "${{ secrets.CHATID }}";
        EOF
  
    - name: Build firmware
      run: |
        source ~/platformio-venv/bin/activate
        pio run
    
    - name: Deploy via OTA
      run: |
        curl -X POST \
          http://${{ secrets.ESP32_IP }}/update \
          -H "Content-Type: multipart/form-data" \
          -F "firmware=@.pio/build/m5stack-atom/firmware.bin"