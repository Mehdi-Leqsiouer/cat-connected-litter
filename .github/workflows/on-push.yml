concurrency: # Cancel any previous runs from the same branch
  group: ${{ github.ref }}
  cancel-in-progress: true

name: CI CD Pipeline
on:
  push:
    branches:
      - 'main'
env:
  python-version: 3.11
jobs:

  run-checks:
    uses: ./.github/workflows/run-checks.yml
    secrets: inherit

  build:
    needs: run-checks
    uses: ./.github/workflows/build.yml
    secrets: inherit
